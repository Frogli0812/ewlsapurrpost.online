version: '3.8'

services:
  # 前端服务
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: cat-booking-frontend
    ports:
      - "80:80"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./logs/nginx:/var/log/nginx
    restart: unless-stopped
    networks:
      - cat-booking-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  # 后端服务 (示例配置，需要根据实际后端调整)
  backend:
    # image: your-backend-image:latest
    # 或使用本地构建
    # build: ../cat-book-backend
    container_name: cat-booking-backend
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=production
      - TZ=Asia/Shanghai
    # volumes:
    #   - ./data:/app/data
    restart: unless-stopped
    networks:
      - cat-booking-network
    # 如果使用数据库
    # depends_on:
    #   - database

  # 数据库服务 (可选，如果后端需要)
  # database:
  #   image: mysql:8.0
  #   container_name: cat-booking-db
  #   environment:
  #     MYSQL_ROOT_PASSWORD: your-root-password
  #     MYSQL_DATABASE: cat_booking
  #     MYSQL_USER: cat_user
  #     MYSQL_PASSWORD: your-password
  #   volumes:
  #     - db_data:/var/lib/mysql
  #   restart: unless-stopped
  #   networks:
  #     - cat-booking-network

  # Nginx 反向代理 (可选，用于 HTTPS 和负载均衡)
  nginx-proxy:
    image: nginx:alpine
    container_name: cat-booking-proxy
    ports:
      - "443:443"
    volumes:
      - ./docker/proxy.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl  # SSL 证书目录
      - ./logs/proxy:/var/log/nginx
    depends_on:
      - frontend
    restart: unless-stopped
    networks:
      - cat-booking-network

networks:
  cat-booking-network:
    driver: bridge

volumes:
  # db_data:  # 如果使用数据库
  logs:
